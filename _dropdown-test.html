<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #1a1a1a; }

        /* Simulating the exact navbar environment */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50;
            background: rgba(44, 34, 32, 0.5);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }
        .navbar-inner {
            max-width: 1400px; margin: 0 auto; padding: 0 48px;
            display: flex; align-items: center; justify-content: flex-end;
            height: 72px; gap: 16px;
        }

        /* The dropdown wrapper */
        .lang-wrap { position: relative; }

        .lang-btn {
            cursor: pointer; display: flex; align-items: center; gap: 6px;
            height: 36px; padding: 0 16px;
            background: rgba(196,154,122,0.15);
            border: 1px solid rgba(196,154,122,0.5);
            border-radius: 9999px; color: #C49A7A;
            font-size: 11px; letter-spacing: 0.18em;
            text-transform: uppercase; font-weight: 600;
        }

        .lang-menu {
            position: fixed;
            min-width: 190px; border-radius: 8px; overflow: hidden;
            background: rgba(44,34,32,0.92);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(196,154,122,0.25);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            opacity: 0; visibility: hidden;
            transform: translateY(-4px);
            pointer-events: none;
            transition: opacity 0.2s, visibility 0.2s, transform 0.2s;
            z-index: 9999;
        }
        .lang-menu.open {
            opacity: 1; visibility: visible;
            transform: translateY(0); pointer-events: auto;
        }
        .lang-menu a {
            display: block; padding: 14px 20px;
            font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
            color: rgba(248,244,239,0.8); text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }
        .lang-menu a:last-child { border-bottom: none; }
        .lang-menu a:hover { background: rgba(196,154,122,0.15); color: #C49A7A; }

        .hero { height: 100vh; background: url('/images/cantori-4.jpg') center/cover; }
        .debug { position: fixed; bottom: 20px; left: 20px; background: #000; color: #0f0; padding: 12px 16px; font-size: 12px; font-family: monospace; z-index: 10000; border-radius: 4px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <span style="color:#F8F4EF; margin-right:auto; font-size:18px; letter-spacing:0.2em; font-weight:600;">DELOS</span>

            <div class="lang-wrap">
                <button class="lang-btn" id="testBtn">
                    <span>EN</span>
                    <svg style="width:12px;height:12px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>
                <div class="lang-menu" id="testMenu">
                    <a href="/ar">AR <span style="opacity:0.5;text-transform:none;letter-spacing:normal;margin-left:8px;">العربية</span></a>
                    <a href="/it">IT <span style="opacity:0.5;text-transform:none;letter-spacing:normal;margin-left:8px;">Italiano</span></a>
                </div>
            </div>
        </div>
    </nav>

    <div class="hero"></div>

    <div class="debug" id="debugInfo">Click the EN button to test dropdown positioning</div>

    <script>
        var btn = document.getElementById('testBtn');
        var menu = document.getElementById('testMenu');
        var debug = document.getElementById('debugInfo');
        var isOpen = false;

        function toggle(show) {
            isOpen = show;
            if (show) {
                var r = btn.getBoundingClientRect();
                menu.style.top = (r.bottom + 8) + 'px';
                menu.style.right = (window.innerWidth - r.right) + 'px';
                menu.style.left = 'auto';
                debug.textContent = 'btn.bottom=' + r.bottom.toFixed(0) + ' btn.right=' + r.right.toFixed(0) + ' menu.top=' + menu.style.top + ' menu.right=' + menu.style.right + ' innerWidth=' + window.innerWidth;
            }
            menu.classList.toggle('open', show);
        }

        btn.addEventListener('click', function(e) { e.stopPropagation(); toggle(!isOpen); });
        document.addEventListener('click', function(e) { if (isOpen && !menu.contains(e.target)) toggle(false); });
    </script>
</body>
</html>
